---
- name: Configurar servidor WordPress
  hosts: wordpress
  become: true

  vars_files:
    - ../group_vars/wordpress/main.yml
    - ../group_vars/wordpress/vault.yml

  vars:
    docker_key_url: https://download.docker.com/linux/ubuntu/gpg
    docker_key_ascii: /etc/apt/keyrings/docker.asc
    docker_key_gpg: /etc/apt/keyrings/docker.gpg

  tasks:
    - name: Atualizar cache do APT
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar pacotes básicos
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Criar diretório de chaves do APT
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Baixar chave oficial do Docker
      ansible.builtin.get_url:
        url: "{{ docker_key_url }}"
        dest: "{{ docker_key_ascii }}"
        owner: root
        group: root
        mode: "0644"

    - name: Converter chave Docker para formato GPG
      ansible.builtin.command:
        cmd: >-
          gpg --dearmor
          --yes
          --output {{ docker_key_gpg }}
          {{ docker_key_ascii }}
        creates: "{{ docker_key_gpg }}"

    - name: Garantir permissões da chave Docker
      ansible.builtin.file:
        path: "{{ docker_key_gpg }}"
        state: file
        owner: root
        group: root
        mode: "0644"

    - name: Remover configuração Docker usando docker.asc
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/docker.list
        regexp: 'signed-by=/etc/apt/keyrings/docker\.asc'
        replace: 'signed-by=/etc/apt/keyrings/docker.gpg'
      failed_when: false

    - name: Remover arquivo Docker sources conflitante
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.sources
        state: absent

    - name: Adicionar repositório oficial do Docker
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by={{ docker_key_gpg }}]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: false

    - name: Atualizar cache após configurar repositório Docker
      ansible.builtin.apt:
        update_cache: true

    - name: Instalar Docker e Docker Compose
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Garantir que o Docker esteja iniciado
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Garantir que o Nginx esteja iniciado
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Adicionar usuário ubuntu ao grupo Docker
      ansible.builtin.user:
        name: ubuntu
        groups:
          - docker
        append: true

    - name: Verificar versão do Docker
      ansible.builtin.command:
        cmd: docker --version
      register: docker_version
      changed_when: false

    - name: Verificar versão do Docker Compose
      ansible.builtin.command:
        cmd: docker compose version
      register: docker_compose_version
      changed_when: false

    - name: Mostrar versões instaladas
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ docker_compose_version.stdout }}"

    - name: Criar diretório do WordPress
      ansible.builtin.file:
        path: "{{ wordpress_directory }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Criar arquivo de variáveis do WordPress
      ansible.builtin.template:
        src: ../templates/wordpress.env.j2
        dest: "{{ wordpress_directory }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      no_log: true
      register: wordpress_env

    - name: Criar arquivo Docker Compose
      ansible.builtin.template:
        src: ../templates/compose.yaml.j2
        dest: "{{ wordpress_directory }}/compose.yaml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      register: wordpress_compose

    - name: Subir containers do WordPress
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ wordpress_directory }}"
      register: docker_compose_up
      changed_when: >-
        'Started' in docker_compose_up.stdout or
        'Created' in docker_compose_up.stdout or
        'Recreated' in docker_compose_up.stdout or
        'Pulled' in docker_compose_up.stdout

    - name: Criar configuração inicial do Nginx do WordPress
      ansible.builtin.template:
        src: ../templates/nginx-wordpress.conf.j2
        dest: "/etc/nginx/sites-available/{{ nginx_site_name }}"
        owner: root
        group: root
        mode: "0644"
        force: false
      register: nginx_configuration

    - name: Ativar site WordPress no Nginx
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ nginx_site_name }}"
        dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}"
        state: link
      register: nginx_site_enabled

    - name: Remover site padrão do Nginx
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      register: nginx_default_removed

    - name: Validar configuração inicial do Nginx
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Recarregar Nginx quando necessário
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when: >-
        nginx_configuration.changed or
        nginx_site_enabled.changed or
        nginx_default_removed.changed

    - name: Aguardar WordPress responder localmente
      ansible.builtin.uri:
        url: "http://{{ wordpress_local_address }}:{{ wordpress_local_port }}"
        method: GET
        status_code:
          - 200
          - 301
          - 302
        follow_redirects: none
      register: wordpress_health
      retries: 15
      delay: 5
      until: wordpress_health.status in [200, 301, 302]

    - name: Verificar se o certificado já existe
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ wordpress_domain }}/fullchain.pem"
      register: wordpress_certificate

    - name: Verificar se o Nginx está configurado para HTTPS
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          nginx -T 2>/dev/null | grep -Eq 'listen[[:space:]]+443'
        executable: /bin/bash
      register: nginx_https_configuration
      changed_when: false
      failed_when: false

    - name: Emitir ou reinstalar certificado SSL com Let's Encrypt
      ansible.builtin.command:
        cmd: >-
          certbot --nginx
          --domain {{ wordpress_domain }}
          --email {{ certbot_email }}
          --agree-tos
          --non-interactive
          --redirect
          {% if wordpress_certificate.stat.exists %}--reinstall{% endif %}
      when: >-
        not wordpress_certificate.stat.exists or
        nginx_https_configuration.rc != 0
      register: certbot_result
      changed_when: certbot_result.rc == 0

    - name: Garantir renovação automática do certificado
      ansible.builtin.systemd:
        name: certbot.timer
        enabled: true
        state: started

    - name: Validar configuração final do Nginx
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Recarregar Nginx após configurar HTTPS
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when: certbot_result is changed

    - name: Verificar se o Nginx está ouvindo na porta 443
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -lnt | grep -Eq '(:|\])443[[:space:]]'
        executable: /bin/bash
      changed_when: false

    - name: Testar acesso HTTPS ao WordPress
      ansible.builtin.uri:
        url: "https://{{ wordpress_domain }}"
        method: GET
        status_code:
          - 200
          - 301
          - 302
        follow_redirects: none
        validate_certs: true
      register: wordpress_https_health
      retries: 10
      delay: 3
      until: wordpress_https_health.status in [200, 301, 302]
